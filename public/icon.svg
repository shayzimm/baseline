  <!-- Data point dots -->
  <circle cx="88"  cy="372" r="18" fill="white" opacity="0.6"/>
  <circle cx="200" cy="278" r="18" fill="white" opacity="0.75"/>
  <circle cx="312" cy="192" r="18" fill="white" opacity="0.88"/>
